name: 🏗️ Build and Push Stable

on:
  push:
    branches: [ releases ]
  workflow_dispatch: ~
  schedule:
    # At 14:00 UTC every day
    - cron: '0 14 * * *'

jobs:
  build:
    uses: ./.github/workflows/build-push.yml
    with:
      stream: stable
      push: true
      branch: releases
      node_versions: '["22","24"]'
      alpine_version: '3.21'
    secrets: inherit
